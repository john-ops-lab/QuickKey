name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-validate:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Validate shortcut library
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh
