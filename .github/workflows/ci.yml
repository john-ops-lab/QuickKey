name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build-and-validate:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-app.sh scripts/build-dmg.sh scripts/build-release.sh
          QUICKKEY_BUILD_DIR="$RUNNER_TEMP/quickkey-build" ./scripts/build-release.sh

      - name: Verify release artifacts
        run: |
          codesign --verify --deep --strict dist/QuickKey.app
          hdiutil verify dist/QuickKey-macOS.dmg
          test -f dist/QuickKey-macOS.zip
          test -d dist/QuickKey.app/KeyboardShortcuts_KeyboardShortcuts.bundle
          test -f dist/QuickKey.app/KeyboardShortcuts_KeyboardShortcuts.bundle/zh-hans.lproj/Localizable.strings

      - name: Validate shortcut library
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: QuickKey-macOS
          path: |
            dist/QuickKey-macOS.zip
            dist/QuickKey-macOS.dmg
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: QuickKey-macOS
          path: dist

      - name: Publish ZIP and DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/QuickKey-macOS.zip \
            dist/QuickKey-macOS.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "QuickKey ${GITHUB_REF_NAME#v}" \
            --generate-notes
